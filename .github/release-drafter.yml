name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
categories:
  - title: '⚠️ Potentially Breaking Changes'
    labels:
      - 'breaking change'
  - title: '🔐 Security'
    labels:
      - 'security'
  - title: '📈 Enhancements'
    labels:
      - 'enhancement'
  - title: '➕ New Features'
    labels:
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
  - title: '📝 Changes'
    labels:
      - 'task'
      - 'tests/CI'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
      - 'composer'
      - 'npm'
exclude-labels:
  - 'skip-changelog'
change-template: '- $TITLE (@$AUTHOR, #$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch
template: |
  $CHANGES
