services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${FOSSBILLING_DB_NAME:-fossbilling}
      MYSQL_ROOT_PASSWORD: ${FOSSBILLING_DB_PASS:-root}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --host=127.0.0.1 --user=root --password=\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  app:
    image: ${FOSSBILLING_TEST_IMAGE:?FOSSBILLING_TEST_IMAGE is required}
    environment:
      APP_ENV: test
    depends_on:
      db:
        condition: service_healthy
