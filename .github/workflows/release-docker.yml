name: Upload Release to Docker Hub

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-dockerhub
  cancel-in-progress: false

jobs:
  check-latest:
    name: 'Check if Release is Latest'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      is_latest: ${{ steps.compare-latest.outputs.is_latest }}
    steps:
      - name: 'Get Latest Release Version Tag'
        id: get-latest
        uses: pozetroninc/github-action-get-latest-release@53d33d213ee71c72360e3c829caf7cee94ec21e2 # master
        with:
          excludes: 'prerelease,draft'
          repository: 'FOSSBilling/FOSSBilling'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Check if Current Release Version is Latest'
        id: compare-latest
        run: |
          if [ "${{ github.ref_name }}" = "${{ steps.get-latest.outputs.release }}" ]; then
            echo "is_latest=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_latest=false" >> "${GITHUB_OUTPUT}"
          fi

  deploy-release-docker:
    name: 'Build and Push Release to Docker Hub'
    permissions:
      contents: read
      packages: write
    needs: [ check-latest ]
    uses: ./.github/workflows/docker-build.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      target: runtime
      cache-scope: cache-release
      extract-release-tree: true
      release-tree-artifact-name: release-build
      meta-images: fossbilling/fossbilling
      meta-tags: |
        type=semver,pattern={{version}}
        type=raw,value=latest,enable=${{ needs.check-latest.outputs.is_latest == 'true' }}
      meta-flavor: |
        latest=false
      build-args: |
        FOSSBILLING_VERSION=${{ github.ref_name }}
        SENTRY_DSN=${{ vars.SENTRY_DSN }}
