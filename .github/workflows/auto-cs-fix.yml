name: Fix Code Quality & Styling

on:
  schedule:
    - cron: "0 12 * * 2,4" # Runs once every Tuesday and Thursday
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-chore-cs-fix
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  fix-cs:
    name: Rector & PHP-CS-Fixer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: PHP Build
        uses: FOSSBilling/.workflows/.github/actions/php-build@76b4af76fb2a1a2b553ec1c2839044984299a271
        with:
          php-version: 8.3

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3
          extensions: intl, xml, dom, curl, iconv, json

      - name: Create Cache Directories
        run: |
          echo "MONTH=$(date '+%h')" >> "${GITHUB_ENV}"
          mkdir -p cache/rector

      - name: Restore Rector Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ./cache/rector
          key: ${{ env.MONTH }}-rector
          restore-keys: ${{ env.MONTH }}-rector

      - name: Restore CS-Fixer Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .php-cs-fixer.cache
          key: ${{ env.MONTH }}-csfixer
          restore-keys: ${{ env.MONTH }}-csfixer

      - name: Run Rector
        id: rector
        run: php src/vendor/bin/rector

      - name: Run PHP-CS-Fixer
        id: php_cs_fixer
        run: php src/vendor/bin/php-cs-fixer fix

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: Apply PHP Code Styling & Quality Changes
          commit-message: Apply PHP Code Styling & Quality Changes
          branch: chore/cs-fix
          body: Automated run of PHP-CS-Fixer and Rector to ensure code styling, quality, and modern practices.
          delete-branch: true
          token: ${{ secrets.BOT_TOKEN }}
          committer: FOSSBilling Bot <fossbilling-bot>
          author: FOSSBilling Bot <fossbilling-bot>
          labels: skip-changelog

      - name: Write Job Summary
        if: always()
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## Code Quality and Styling

          | Item | Value |
          | --- | --- |
          | PHP version | `8.3` |
          | Rector | `${{ steps.rector.outcome }}` |
          | PHP-CS-Fixer | `${{ steps.php_cs_fixer.outcome }}` |
          | Pull request action | `${{ steps.create_pr.outcome }}` |
          | Pull request | `${{ steps.create_pr.outputs.pull-request-url || 'No changes' }}` |
          EOF
