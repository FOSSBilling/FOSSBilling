name: Live Tests

on:
  workflow_call:

jobs:
  live-tests:
    name: 'Live Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: 'Lowercase github.repository'
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # This job runs checked-out live-test code, so it only reads the registry cache.
      - name: 'Build Docker Test Image'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          build-args: |
            PHP_VERSION=8.5
            INSTALL_TRANSLATIONS=false
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}:cache-ci-8.5
          context: .
          load: true
          tags: |
            fossbilling:live-test
          target: test

      - name: 'Run Live Tests'
        run: bash ./.github/scripts/run-docker-live-tests.sh fossbilling:live-test
