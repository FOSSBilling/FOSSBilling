name: Cypress Tests

on:
  workflow_call:
    inputs:
      cypress-project-id:
        required: false
        type: string
        default: ''
    secrets:
      CYPRESS_RECORD_KEY:
        required: false

jobs:
  cypress-tests:
    name: 'Cypress Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CYPRESS_RECORDING_DISABLED: ${{ secrets.CYPRESS_RECORD_KEY == '' }}
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: 'Set up Docker Compose'
        uses: docker/setup-compose-action@4eb059ff7f16592f9c84d5ca339c53cb7c5064e2 # v2.3.0

      # Reuses the image already built once in the PHP Build and Test (8.5) job.
      - name: 'Download Test Image Artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-image-8.5.tar.zst
          path: /tmp

      - name: 'Load Test Image'
        run: zstd --decompress --stdout /tmp/test-image-8.5.tar.zst | docker load

      - name: 'Run Cypress Tests'
        env:
          CYPRESS_PROJECT_ID: ${{ inputs.cypress-project-id }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        run: bash ./.github/scripts/run-docker-cypress-tests.sh fossbilling:test-8.5

      - name: 'Upload Cypress Artifacts'
        if: ${{ failure() && env.CYPRESS_RECORDING_DISABLED == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cypress-artifacts
          if-no-files-found: ignore
          path: |
            tests/E2E/Cypress/artifacts/screenshots
            tests/E2E/Cypress/artifacts/videos
            tests/E2E/Cypress/artifacts/downloads
