name: Browser Tests

on:
  workflow_call:

jobs:
  browser-tests:
    name: 'Browser Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 'Lowercase github.repository'
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: 'Set up Docker Compose'
        uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c # v2.2.0

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: 'Build Docker Test Image'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          build-args: |
            PHP_VERSION=8.5
            INSTALL_TRANSLATIONS=false
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}-build-cache:cache-ci-8.5
          context: .
          load: true
          tags: |
            fossbilling:browser-test
          target: test

      - name: 'Run Browser Tests'
        run: bash ./.github/scripts/run-docker-browser-tests.sh fossbilling:browser-test

      - name: 'Upload Browser Test Artifacts'
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browser-test-artifacts
          if-no-files-found: ignore
          path: |
            tests/Browser/Screenshots
