name: GHCR Package Cleanup

permissions:
  contents: read
  packages: write

on:
  schedule:
    - cron: '37 3 * * *'
  workflow_dispatch:

concurrency:
  group: ghcr-package-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: 'Delete Untagged GHCR Versions'
    if: ${{ github.repository == 'FOSSBilling/FOSSBilling' }}
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: 'Delete Untagged GHCR Versions'
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: FOSSBilling
          MIN_VERSIONS_TO_KEEP: 20
        run: |
          set -euo pipefail

          cleanup_package() {
            local package_name="$1"
            local versions_to_delete

            echo "Finding untagged versions for ${OWNER}/${package_name}"
            versions_to_delete="$(
              gh api --paginate "/orgs/${OWNER}/packages/container/${package_name}/versions?per_page=100" \
                --jq '.[] | select((.metadata.container.tags | length) == 0) | [.created_at, .id] | @tsv' \
                | sort -r \
                | tail -n +"$((MIN_VERSIONS_TO_KEEP + 1))" \
                | cut -f2
            )"

            if [ -z "${versions_to_delete}" ]; then
              echo "No untagged versions to delete for ${package_name}"
              return
            fi

            while IFS= read -r version_id; do
              [ -n "${version_id}" ] || continue
              echo "Deleting ${package_name} package version ${version_id}"
              gh api \
                --method DELETE \
                "/orgs/${OWNER}/packages/container/${package_name}/versions/${version_id}"
            done <<< "${versions_to_delete}"
          }

          cleanup_package fossbilling
          cleanup_package fossbilling-build-cache
