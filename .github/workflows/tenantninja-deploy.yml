name: TenantNinja Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push runtime image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout extensions repo
        uses: actions/checkout@v4
        with:
          repository: tenantninja/fossbilling-extensions
          path: extensions

      - name: Bake in Zoho Books module
        run: cp -r extensions/fossbilling-zoho-books/modules/Zohobooks src/modules/Zohobooks

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/tenantninja/fossbilling:latest
            ghcr.io/tenantninja/fossbilling:${{ github.sha }}
          build-args: |
            FOSSBILLING_VERSION=0.8.3
            INSTALL_TRANSLATIONS=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
