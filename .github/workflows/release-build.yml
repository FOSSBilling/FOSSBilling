name: 'Build and Prepare Release Archive'

on: 
  workflow_call:
    inputs:
      artifact-name: 
        description: 'The artifact name to use when uploading the preview archive.'
        default: 'preview-build'
        required: false
        type: string
      preview:
        description: 'Whether the release is a preview release or not.'
        default: true
        required: false
        type: boolean
      cache-scope:
        description: 'The GHA cache scope to read cached layers from (e.g. from a parallel Docker image build).'
        default: ''
        required: false
        type: string

jobs:
  release-build:
    name: 'Build and Prepare Release'
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: 'Build Release Artifact'
        run: |
          cache_args=()
          if [ -n "${{ inputs.cache-scope }}" ]; then
            cache_args+=(--cache-from "type=gha,scope=${{ inputs.cache-scope }}")
          fi

          docker buildx build \
            --target release-artifact \
            --build-arg FOSSBILLING_VERSION="${{ inputs.preview && github.sha || github.ref_name }}" \
            --build-arg FOSSBILLING_VERSION_TRUNCATE="${{ inputs.preview && '7' || '0' }}" \
            --build-arg SENTRY_DSN="${{ vars.SENTRY_DSN }}" \
            "${cache_args[@]}" \
            --output type=local,dest=./release-tree \
            .

      - name: 'Create Release Build Archive'
        run: tar -cf /tmp/build.tar -C ./release-tree ./

      - name: 'Upload Release Build Archive'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: 'error'
          name: ${{ inputs.artifact-name }}
          path: /tmp/build.tar
          retention-days: 1
